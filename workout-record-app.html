<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>筋トレ記録アプリ</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
      color: #222;
    }
    header {
      background: #111;
      color: white;
      padding: 18px 16px;
      text-align: center;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 16px;
    }
    .card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    label {
      display: block;
      margin-top: 12px;
      font-weight: 600;
    }
    input, select, textarea, button {
      width: 100%;
      box-sizing: border-box;
      font-size: 16px;
      padding: 12px;
      margin-top: 6px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }
    textarea {
      min-height: 80px;
      resize: vertical;
    }
    button {
      border: none;
      background: #111;
      color: white;
      font-weight: 700;
      margin-top: 16px;
      cursor: pointer;
    }
    button.secondary {
      background: #666;
    }
    button.danger {
      background: #b00020;
    }
    .record {
      border-bottom: 1px solid #eee;
      padding: 12px 0;
    }
    .record:last-child {
      border-bottom: none;
    }
    .record-title {
      font-weight: 700;
      font-size: 17px;
    }
    .record-meta {
      color: #555;
      margin-top: 4px;
      line-height: 1.5;
    }
    .empty {
      color: #777;
      text-align: center;
      padding: 20px 0;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .small {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }
    .previous {
      background: #f0f0f0;
      border-radius: 10px;
      padding: 10px;
      margin-top: 10px;
      color: #333;
    }
  </style>
</head>
<body>
  <header>
    <h1>筋トレ記録</h1>
  </header>

  <main>
    <section class="card">
      <h2>今日のトレーニングを記録</h2>

      <label for="date">日付</label>
      <input id="date" type="date" />

      <label for="exercise">種目</label>
      <select id="exercise">
        <option>ベンチプレス</option>
        <option>インクラインダンベルプレス</option>
        <option>インクラインダンベルフライ</option>
        <option>ディップス</option>
        <option>ダンベルショルダープレス</option>
        <option>サイドレイズ</option>
        <option>チンニング</option>
        <option>ラットプルダウン</option>
        <option>ダンベルロー</option>
        <option>レッグプレス</option>
        <option>Vスクワット</option>
        <option>その他</option>
      </select>

      <div class="previous" id="previousRecord">前回記録：まだありません</div>

      <div class="row">
        <div>
          <label for="weight">重量 kg</label>
          <input id="weight" type="number" step="0.5" placeholder="例：34" />
        </div>
        <div>
          <label for="reps">回数</label>
          <input id="reps" type="number" placeholder="例：10" />
        </div>
      </div>

      <label for="sets">セット数</label>
      <input id="sets" type="number" placeholder="例：3" />

      <label for="memo">メモ</label>
      <textarea id="memo" placeholder="例：胸の入り良い。次回36kg挑戦。"></textarea>

      <button onclick="saveRecord()">保存する</button>
      <button class="secondary" onclick="exportCSV()">CSVで書き出し</button>
    </section>

    <section class="card">
      <h2>記録一覧</h2>
      <div id="records"></div>
      <button class="danger" onclick="clearAll()">全記録を削除</button>
      <p class="small">※記録はこの端末のブラウザ内に保存されます。別端末には自動同期されません。</p>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "workout_records_v1";

    const dateInput = document.getElementById("date");
    const exerciseInput = document.getElementById("exercise");

    dateInput.valueAsDate = new Date();

    function getRecords() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    }

    function setRecords(records) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    function saveRecord() {
      const record = {
        id: Date.now(),
        date: document.getElementById("date").value,
        exercise: document.getElementById("exercise").value,
        weight: document.getElementById("weight").value,
        reps: document.getElementById("reps").value,
        sets: document.getElementById("sets").value,
        memo: document.getElementById("memo").value
      };

      if (!record.date || !record.exercise || !record.weight || !record.reps || !record.sets) {
        alert("日付・種目・重量・回数・セット数を入力してください。");
        return;
      }

      const records = getRecords();
      records.unshift(record);
      setRecords(records);

      document.getElementById("weight").value = "";
      document.getElementById("reps").value = "";
      document.getElementById("sets").value = "";
      document.getElementById("memo").value = "";

      renderRecords();
      updatePreviousRecord();
    }

    function deleteRecord(id) {
      const records = getRecords().filter(r => r.id !== id);
      setRecords(records);
      renderRecords();
      updatePreviousRecord();
    }

    function renderRecords() {
      const container = document.getElementById("records");
      const records = getRecords();

      if (records.length === 0) {
        container.innerHTML = '<div class="empty">まだ記録がありません</div>';
        return;
      }

      container.innerHTML = records.map(r => `
        <div class="record">
          <div class="record-title">${r.date}　${r.exercise}</div>
          <div class="record-meta">
            ${r.weight}kg × ${r.reps}回 × ${r.sets}セット<br>
            ${r.memo ? "メモ：" + escapeHtml(r.memo) : ""}
          </div>
          <button class="danger" onclick="deleteRecord(${r.id})">この記録を削除</button>
        </div>
      `).join("");
    }

    function updatePreviousRecord() {
      const exercise = exerciseInput.value;
      const records = getRecords().filter(r => r.exercise === exercise);

      const previous = document.getElementById("previousRecord");

      if (records.length === 0) {
        previous.textContent = "前回記録：まだありません";
        return;
      }

      const r = records[0];
      previous.textContent = `前回記録：${r.date} / ${r.weight}kg × ${r.reps}回 × ${r.sets}セット`;
    }

    function clearAll() {
      if (confirm("本当にすべての記録を削除しますか？")) {
        localStorage.removeItem(STORAGE_KEY);
        renderRecords();
        updatePreviousRecord();
      }
    }

    function exportCSV() {
      const records = getRecords();
      if (records.length === 0) {
        alert("書き出す記録がありません。");
        return;
      }

      const header = ["日付", "種目", "重量kg", "回数", "セット数", "メモ"];
      const rows = records.map(r => [r.date, r.exercise, r.weight, r.reps, r.sets, r.memo]);

      const csv = [header, ...rows]
        .map(row => row.map(value => `"${String(value).replaceAll('"', '""')}"`).join(","))
        .join("\n");

      const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "workout_records.csv";
      a.click();
      URL.revokeObjectURL(url);
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    exerciseInput.addEventListener("change", updatePreviousRecord);

    renderRecords();
    updatePreviousRecord();
  </script>
</body>
</html>
