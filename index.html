<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>筋トレ記録</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      background: #f5f5f5;
      color: #222;
    }
    header {
      background: #111;
      color: white;
      padding: 18px;
      text-align: center;
      font-size: 20px;
    }
    main {
      padding: 16px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    input, select, textarea, button {
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }
    button {
      background: black;
      color: white;
      font-weight: bold;
    }
    .record {
      border-bottom: 1px solid #eee;
      padding: 10px 0;
    }
  </style>
</head>
<body>

<header>筋トレ記録</header>

<main>
  <div class="card">
    <input id="date" type="date" />
    <select id="exercise">
      <option>ベンチプレス</option>
      <option>インクラインダンベルプレス</option>
      <option>ディップス</option>
    </select>
    <input id="weight" type="number" placeholder="重量 (kg)" />
    <input id="reps" type="number" placeholder="回数" />
    <input id="sets" type="number" placeholder="セット数" />
    <textarea id="memo" placeholder="メモ"></textarea>
    <button onclick="save()">保存</button>
  </div>

  <div class="card">
    <h3>記録一覧</h3>
    <div id="list"></div>
  </div>
</main>

<script>
  const KEY = "workout";

  function getData() {
    return JSON.parse(localStorage.getItem(KEY) || "[]");
  }

  function save() {
    const data = getData();
    data.unshift({
      date: document.getElementById("date").value,
      exercise: document.getElementById("exercise").value,
      weight: document.getElementById("weight").value,
      reps: document.getElementById("reps").value,
      sets: document.getElementById("sets").value,
      memo: document.getElementById("memo").value
    });
    localStorage.setItem(KEY, JSON.stringify(data));
    render();
  }

  function render() {
    const list = document.getElementById("list");
    const data = getData();
    list.innerHTML = data.map(d => `
      <div class="record">
        <b>${d.date} ${d.exercise}</b><br>
        ${d.weight}kg × ${d.reps}回 × ${d.sets}セット<br>
        ${d.memo || ""}
      </div>
    `).join("");
  }

  render();
</script>

</body>
</html>
