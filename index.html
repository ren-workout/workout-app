<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Workout</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f172a;
  color: #e5e7eb;
}

header {
  text-align: center;
  padding: 20px;
  font-size: 22px;
  font-weight: bold;
  background: #020617;
  border-bottom: 1px solid #1e293b;
}

main { padding: 16px; }

.card {
  background: #020617;
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 16px;
  border: 1px solid #1e293b;
}
#calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  margin-top: 10px;
}

.day {
  padding: 10px;
  text-align: center;
  border-radius: 8px;
  background: #0f172a;
  font-size: 12px;
}

.active {
  background: #3b82f6;
}
input, select, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #1e293b;
  background: #0f172a;
  color: white;
}

button {
  width: 100%;
  margin-top: 14px;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-weight: bold;
  background: linear-gradient(135deg, #3b82f6, #06b6d4);
  color: white;
}

.delete {
  background: #ef4444;
  margin-top: 8px;
}

.record {
  border-bottom: 1px solid #1e293b;
  padding: 10px 0;
}

.meta { color: #94a3b8; font-size: 14px; }

canvas {
  margin-top: 10px;
}
</style>
</head>

<body>

<header>My Workout</header>

<main>

<div class="card">

<input id="date" type="date">

<select id="exercise">
<option>ベンチプレス</option>
<option>インクラインダンベルプレス</option>
<option>インクラインダンベルフライ</option>
<option>ディップス</option>
<option>ケーブルクロス</option>

<option>ダンベルショルダープレス</option>
<option>サイドレイズ</option>
<option>リアレイズ</option>

<option>チンニング</option>
<option>ラットプルダウン</option>
<option>ダンベルロー</option>

<option>アームカール</option>
<option>ハンマーカール</option>
<option>ケーブルプレスダウン</option>

<option>レッグプレス</option>
<option>Vスクワット</option>
<option>レッグカール</option>

<option>その他</option>
</select>

<input id="customExercise" placeholder="または種目を入力">

<div id="previous" class="meta"></div>

<input id="weight" type="number" placeholder="重量 (kg)">
<input id="reps" type="number" placeholder="回数">
<input id="sets" type="number" placeholder="セット数">
<textarea id="memo" placeholder="メモ"></textarea>

<button onclick="save()">保存</button>

</div>

<div class="card">
<h3>体重記録</h3>
<input id="bodyWeight" type="number" placeholder="体重 (kg)">
<button onclick="saveWeight()">保存</button>
<canvas id="weightChart"></canvas>
</div>

<div class="card">
<h3>重量グラフ</h3>
<canvas id="chart"></canvas>
</div>
<div class="card">
  <h3>トレーニングカレンダー</h3>
  <div id="calendar"></div>
</div>
<div class="card">
<h3>記録一覧</h3>
<div id="list"></div>
</div>

</main>

<script>
const KEY = "workout";
const WEIGHT_KEY = "bodyweight";

document.getElementById("date").valueAsDate = new Date();

function getData() {
  return JSON.parse(localStorage.getItem(KEY) || "[]");
}

function getWeightData() {
  return JSON.parse(localStorage.getItem(WEIGHT_KEY) || "[]");
}

function save() {
  const data = getData();

  const exercise = document.getElementById("customExercise").value
    || document.getElementById("exercise").value;

  data.unshift({
    id: Date.now(),
    date: document.getElementById("date").value,
    exercise,
    weight: document.getElementById("weight").value,
    reps: document.getElementById("reps").value,
    sets: document.getElementById("sets").value,
    memo: document.getElementById("memo").value
  });

  localStorage.setItem(KEY, JSON.stringify(data));

  render();
  updatePrevious();
  drawChart();
}

function saveWeight() {
  const data = getWeightData();

  data.unshift({
    date: new Date().toISOString().slice(0,10),
    weight: document.getElementById("bodyWeight").value
  });

  localStorage.setItem(WEIGHT_KEY, JSON.stringify(data));
  drawWeightChart();
}

function render() {
  const data = getData();
  const list = document.getElementById("list");

  list.innerHTML = data.map(d => `
    <div class="record">
      <b>${d.date} ${d.exercise}</b><br>
      ${d.weight}kg × ${d.reps}回 × ${d.sets}セット<br>
      <span class="meta">${d.memo || ""}</span>
      <button class="delete" onclick="del(${d.id})">削除</button>
    </div>
  `).join("");
}

function del(id) {
  const data = getData().filter(d => d.id !== id);
  localStorage.setItem(KEY, JSON.stringify(data));
  render();
  drawChart();
}

function updatePrevious() {
  const exercise = document.getElementById("customExercise").value
    || document.getElementById("exercise").value;

  const data = getData().filter(d => d.exercise === exercise);

  if (data.length === 0) {
    document.getElementById("previous").innerText = "";
    return;
  }

  const last = data[0];

  document.getElementById("previous").innerText =
    `前回：${last.weight}kg × ${last.reps}回`;
}

let chart, weightChart;

function drawChart() {
  const exercise = document.getElementById("customExercise").value
    || document.getElementById("exercise").value;

  const data = getData().filter(d => d.exercise === exercise);

  const labels = data.map(d => d.date).reverse();
  const weights = data.map(d => d.weight).reverse();

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: exercise,
        data: weights
      }]
    }
  });
}

function drawWeightChart() {
  const data = getWeightData();

  const labels = data.map(d => d.date).reverse();
  const weights = data.map(d => d.weight).reverse();

  if (weightChart) weightChart.destroy();

  weightChart = new Chart(document.getElementById("weightChart"), {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "体重",
        data: weights
      }]
    }
  });
}

document.getElementById("exercise").addEventListener("change", () => {
  updatePrevious();
  drawChart();
});

document.getElementById("customExercise").addEventListener("input", () => {
  updatePrevious();
  drawChart();
});

render();
drawChart();
drawWeightChart();
drawCalendar();
  function drawCalendar() {
  const calendar = document.getElementById("calendar");
  const data = getData();

  const today = new Date();
  const year = today.getFullYear();
  const month = today.getMonth();

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month + 1, 0).getDate();

  calendar.innerHTML = "";

  for (let i = 0; i < firstDay; i++) {
    calendar.innerHTML += `<div></div>`;
  }

  for (let d = 1; d <= lastDate; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

    const hasWorkout = data.some(r => r.date === dateStr);

    calendar.innerHTML += `
      <div class="day ${hasWorkout ? 'active' : ''}">
        ${d}
      </div>
    `;
  }
}
render();
drawChart();
drawWeightChart();
drawCalendar();
</script>

</body>
</html>
